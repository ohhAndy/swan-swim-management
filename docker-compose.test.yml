version: '3.8'

services:
  test-db:
    image: postgres:17
    container_name: test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    volumes:
      - test-db-data:/var/lib/postgresql/data

volumes:
  test-db-data:
